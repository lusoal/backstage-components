apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: langfuse
  namespace: argocd
  labels:
    managed-by: backstage
    app: langfuse
spec:
  project: default
  source:
    repoURL: https://github.com/lusoal/backstage-components
    targetRevision: HEAD
    path: langfuse/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: langfuse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
